<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="0"/>
  <!-- Sun -->
  <circle cx="256" cy="220" r="72" fill="#fbbf24" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="256" y1="120" x2="256" y2="100"/>
    <line x1="256" y1="320" x2="256" y2="340"/>
    <line x1="156" y1="220" x2="136" y2="220"/>
    <line x1="356" y1="220" x2="376" y2="220"/>
    <line x1="185" y1="149" x2="171" y2="135"/>
    <line x1="327" y1="149" x2="341" y2="135"/>
    <line x1="185" y1="291" x2="171" y2="305"/>
    <line x1="327" y1="291" x2="341" y2="305"/>
  </g>
  <!-- Cloud -->
  <g opacity="0.9">
    <ellipse cx="300" cy="310" rx="80" ry="45" fill="#e2e8f0"/>
    <ellipse cx="250" cy="310" rx="65" ry="40" fill="#f1f5f9"/>
    <circle cx="270" cy="275" r="45" fill="#f8fafc"/>
    <circle cx="320" cy="285" r="35" fill="#e2e8f0"/>
  </g>
  <!-- Temperature text -->
  <text x="256" y="440" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">Perfect</text>
</svg>
